# ──────────────────────────────────────────────
# PropTax Engine — Docker Compose
# Mode complet (avec MongoDB) ou dégradé (sans)
# ──────────────────────────────────────────────

services:
  proptax-engine:
    build: .
    ports:
      - "3400:3400"
    environment:
      - PORT=3400
      - LOG_LEVEL=info
      - MONGODB_URI=mongodb://mongo:27017/proptax
      - API_KEYS=${API_KEYS:-}
      - RATE_LIMIT_MAX=100
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - proptax-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  proptax-data:
